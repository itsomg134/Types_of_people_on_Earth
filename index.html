<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> AquaWheel · Games with Homework</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 20% 30%, #0b2b36, #04161e);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .app {
      max-width: 1100px;
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 48px;
      padding: 30px 30px 40px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a0e9ff, #4db8d9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }

    .logo span {
      font-size: 2.8rem;
      filter: drop-shadow(0 0 10px #4db8d9);
    }

    .badge {
      background: rgba(255, 255, 255, 0.12);
      padding: 8px 18px;
      border-radius: 40px;
      color: #b3e4f0;
      font-weight: 500;
      font-size: 0.9rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(4px);
    }

    /* ---------- GRID LAYOUT ---------- */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }

    @media (max-width: 780px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ---------- WHEEL CARD ---------- */
    .card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 32px;
      padding: 24px 20px 28px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(4px);
      transition: transform 0.2s, box-shadow 0.3s;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
    }

    .card-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: #c2e6f0;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .card-title .icon {
      font-size: 1.6rem;
    }

    /* ---------- WHEEL ---------- */
    .wheel-wrapper {
      position: relative;
      width: 100%;
      max-width: 400px;
      margin: 0 auto 16px;
      touch-action: none;
    }

    canvas#wheelCanvas {
      display: block;
      width: 100% !important;
      height: auto !important;
      aspect-ratio: 1/1;
      border-radius: 50%;
      box-shadow: 0 12px 0 #10323d, 0 20px 40px rgba(0, 0, 0, 0.6);
      cursor: pointer;
      transition: filter 0.2s;
      background: #eef8fd;
    }

    canvas#wheelCanvas:active {
      filter: brightness(0.95);
    }

    .pointer {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-top: 40px solid #f5d742;
      filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.5));
      z-index: 5;
      pointer-events: none;
    }
    .pointer::after {
      content: '';
      position: absolute;
      top: -44px;
      left: -12px;
      width: 24px;
      height: 24px;
      background: radial-gradient(circle, #ffec9e, #d9b31a);
      border-radius: 50%;
      box-shadow: 0 0 0 4px #1f5a66;
    }

    /* ---------- SCORE PANEL ---------- */
    .score-panel {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 12px;
      margin: 14px 0 18px;
      background: rgba(0, 0, 0, 0.25);
      padding: 14px 12px;
      border-radius: 40px;
      backdrop-filter: blur(4px);
    }

    .score-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #d4edf5;
      font-weight: 500;
    }

    .score-item .value {
      background: #1c4f5e;
      padding: 2px 18px;
      border-radius: 30px;
      font-size: 1.5rem;
      font-weight: 700;
      color: #fafffe;
      min-width: 60px;
      text-align: center;
      box-shadow: inset 0 -3px 0 #0a323d;
    }

    .score-item .value.last {
      background: #ffe484;
      color: #1f4a55;
    }

    /* ---------- BUTTONS ---------- */
    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      border: none;
      padding: 14px 28px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.1s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex: 1 1 auto;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.06);
      color: #d4edf5;
      backdrop-filter: blur(4px);
    }

    .btn:active {
      transform: translateY(4px);
    }

    .btn-primary {
      background: linear-gradient(135deg, #f5d742, #e6b800);
      color: #0a2d38;
      box-shadow: 0 6px 0 #9e811f, 0 6px 16px rgba(0, 0, 0, 0.4);
      border-color: rgba(255, 215, 0, 0.3);
    }
    .btn-primary:active {
      box-shadow: 0 2px 0 #9e811f;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 6px 0 #1e3f49;
    }
    .btn-secondary:active {
      box-shadow: 0 2px 0 #1e3f49;
    }

    .btn-danger {
      background: rgba(255, 70, 70, 0.2);
      color: #ff9e9e;
      box-shadow: 0 6px 0 #4d1e1e;
    }

    /* ---------- HOMEWORK SECTION ---------- */
    .homework-list {
      list-style: none;
      margin: 16px 0 12px;
      max-height: 260px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .homework-list::-webkit-scrollbar {
      width: 5px;
    }
    .homework-list::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
    }
    .homework-list::-webkit-scrollbar-thumb {
      background: #4db8d9;
      border-radius: 10px;
    }

    .hw-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.04);
      padding: 12px 16px;
      margin-bottom: 8px;
      border-radius: 20px;
      border-left: 4px solid #4db8d9;
      transition: background 0.2s;
    }

    .hw-item:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .hw-text {
      color: #e3f0f5;
      font-weight: 500;
      word-break: break-word;
      padding-right: 12px;
    }

    .hw-delete {
      background: none;
      border: none;
      color: #ff7a7a;
      font-size: 1.4rem;
      cursor: pointer;
      padding: 0 8px;
      transition: 0.15s;
      line-height: 1;
    }
    .hw-delete:hover {
      transform: scale(1.3);
      color: #ff3a3a;
    }

    .hw-empty {
      color: #7a9caa;
      font-style: italic;
      text-align: center;
      padding: 20px 0;
    }

    .hw-input-group {
      display: flex;
      gap: 10px;
      margin-top: 6px;
    }

    .hw-input-group input {
      flex: 1;
      padding: 12px 18px;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(0, 0, 0, 0.3);
      color: #f0faff;
      font-size: 1rem;
      outline: none;
      transition: 0.2s;
    }
    .hw-input-group input:focus {
      border-color: #4db8d9;
      box-shadow: 0 0 20px rgba(77, 184, 217, 0.15);
    }
    .hw-input-group input::placeholder {
      color: #7a9caa;
    }

    .btn-small {
      padding: 12px 20px;
      font-size: 1rem;
      border-radius: 40px;
      flex: 0 0 auto;
    }

    .pick-task-btn {
      background: rgba(77, 184, 217, 0.2);
      border: 1px solid rgba(77, 184, 217, 0.3);
      color: #b3e4f0;
      margin-top: 8px;
      width: 100%;
    }
    .pick-task-btn:hover {
      background: rgba(77, 184, 217, 0.3);
    }

    .selected-task {
      margin-top: 12px;
      padding: 14px 18px;
      background: rgba(255, 215, 0, 0.12);
      border-radius: 30px;
      border: 1px solid rgba(255, 215, 0, 0.2);
      color: #ffe484;
      font-weight: 600;
      text-align: center;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
    }

    /* ---------- RESPONSIVE ---------- */
    @media (max-width: 500px) {
      .app { padding: 16px; }
      .logo h1 { font-size: 1.6rem; }
      .btn { font-size: 0.95rem; padding: 12px 18px; }
      .score-panel { flex-direction: column; align-items: center; }
    }

    /* ---------- ANIMATIONS ---------- */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card {
      animation: fadeSlideUp 0.6s ease forwards;
    }
    .card:nth-child(2) { animation-delay: 0.15s; }
  </style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <span>Jal hai to kal hai, Aur AC hai to mal hai</span>
      <h1>AquaWheel jivan ke sath bhi jivan ke dadbhi</h1>
    </div>
    <div class="badge"> games with homework</div>
  </header>

  <div class="main-grid">

    <section class="card">
      <div class="card-title"><span class="icon"></span> Spin &amp; Win</div>

      <div class="wheel-wrapper">
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
        <div class="pointer" aria-hidden="true"></div>
      </div>

      <div class="score-panel">
        <div class="score-item">
           Score
          <span class="value" id="scoreDisplay">0</span>
        </div>
        <div class="score-item">
          💦 Last
          <span class="value last" id="lastWinDisplay">—</span>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" id="spinBtn"> SPIN</button>
        <button class="btn btn-secondary" id="resetBtn">⟳ Reset</button>
      </div>
      <div style="text-align:center; margin-top:10px; color:#7a9caa; font-size:0.85rem;">
        
      </div>
    </section>

    <section class="card">
      <div class="card-title"><span class="icon"></span> Homework Tasks</div>

      <ul class="homework-list" id="hwList">
        <li class="hw-empty">No tasks yet. Add one below!</li>
      </ul>

      <div class="hw-input-group">
        <input type="text" id="hwInput" placeholder="e.g. Math exercises p.45" maxlength="60">
        <button class="btn btn-primary btn-small" id="addHwBtn"> Add</button>
      </div>

      <button class="btn pick-task-btn" id="pickTaskBtn"> Pick random task</button>

      <div class="selected-task" id="selectedTaskDisplay">
        <span style="opacity:0.5;">Your task will appear here</span>
      </div>
    </section>

  </div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const scoreSpan = document.getElementById('scoreDisplay');
    const lastWinSpan = document.getElementById('lastWinDisplay');

    const SEGMENTS = [
      { label: ' 1',   value: 1,  color: '#b3e0f0' },
      { label: ' 2',   value: 2,  color: '#9ad4e8' },
      { label: ' 3',   value: 3,  color: '#7fc8df' },
      { label: ' 5',   value: 5,  color: '#64bcd6' },
      { label: ' 10',  value: 10, color: '#4aafcc' },
      { label: ' 15',  value: 15, color: '#2fa3c3' },
      { label: ' 20',  value: 20, color: '#1a96b9' },
      { label: ' 30',  value: 30, color: '#0f8aae' },
      { label: ' 50',  value: 50, color: '#057da2' },
      { label: ' 100', value: 100,color: '#006f94' },
    ];
    const SEG_COUNT = SEGMENTS.length;
    const ANGLE_PER_SEG = (2 * Math.PI) / SEG_COUNT;

    let currentRotation = 0;
    let score = 0;
    let lastWinValue = null;
    let isSpinning = false;
    let spinVelocity = 0;
    const SPIN_DECAY = 0.985;
    const MIN_SPIN = 0.012;
    let animFrame = null;

    const spinBtn = document.getElementById('spinBtn');
    const resetBtn = document.getElementById('resetBtn');

    function drawWheel(rotation) {
      const w = canvas.width, h = canvas.height;
      const radius = Math.min(w, h) * 0.44;
      const cx = w/2, cy = h/2;

      ctx.clearRect(0, 0, w, h);

      for (let i = 0; i < SEG_COUNT; i++) {
        const start = i * ANGLE_PER_SEG + rotation;
        const end = start + ANGLE_PER_SEG;
        const seg = SEGMENTS[i];

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, start, end);
        ctx.closePath();
        ctx.fillStyle = seg.color;
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2.5;
        ctx.stroke();

        const mid = start + ANGLE_PER_SEG/2;
        const labelR = radius * 0.72;
        const x = cx + Math.cos(mid) * labelR;
        const y = cy + Math.sin(mid) * labelR;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(mid + (mid > Math.PI/2 ? Math.PI : 0));
        ctx.font = 'bold 20px "Segoe UI", system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        ctx.shadowBlur = 8;
        ctx.fillStyle = '#01212b';
        ctx.fillText(seg.label, 0, 0);
        ctx.restore();
      }

      // center
      ctx.beginPath();
      ctx.arc(cx, cy, radius*0.13, 0, 2*Math.PI);
      ctx.fillStyle = '#f5faff';
      ctx.shadowBlur = 14;
      ctx.shadowColor = 'rgba(0,0,0,0.2)';
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#1c6679';
      ctx.lineWidth = 4;
      ctx.stroke();
      ctx.font = '28px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#06566e';
      ctx.fillText('🤭', cx, cy-2);
    }

    function getWinIndex(rotation) {
      const pointerAngle = -Math.PI/2;
      let raw = (pointerAngle - rotation) % (2*Math.PI);
      if (raw < 0) raw += 2*Math.PI;
      let idx = Math.floor(raw / ANGLE_PER_SEG);
      if (idx >= SEG_COUNT) idx = 0;
      return idx;
    }

    function updateUI(winIdx) {
      if (winIdx !== null && winIdx !== undefined) {
        const val = SEGMENTS[winIdx].value;
        lastWinValue = val;
        lastWinSpan.textContent = val;
        score += val;
        scoreSpan.textContent = score;
      } else {
        scoreSpan.textContent = score;
        lastWinSpan.textContent = (lastWinValue !== null) ? lastWinValue : '—';
      }
    }

    function startSpin() {
      if (isSpinning) return;
      spinVelocity = (0.5 + Math.random() * 1.6) * (Math.random() > 0.5 ? 1 : -1);
      if (Math.abs(spinVelocity) < 0.7) spinVelocity = 0.8 * (spinVelocity >= 0 ? 1 : -1);
      isSpinning = true;
      spinBtn.disabled = true;
      spinBtn.style.opacity = '0.7';
      if (animFrame) cancelAnimationFrame(animFrame);
      animateSpin();
    }

    function animateSpin() {
      if (!isSpinning) {
        drawWheel(currentRotation);
        return;
      }
      spinVelocity *= SPIN_DECAY;
      if (Math.abs(spinVelocity) < MIN_SPIN) {
        spinVelocity = 0;
        isSpinning = false;
        spinBtn.disabled = false;
        spinBtn.style.opacity = '1';
        const winIdx = getWinIndex(currentRotation);
        updateUI(winIdx);
        drawWheel(currentRotation);
        lastWinSpan.style.transition = '0.15s';
        lastWinSpan.style.transform = 'scale(1.4)';
        setTimeout(() => lastWinSpan.style.transform = 'scale(1)', 200);
        return;
      }
      currentRotation = (currentRotation + spinVelocity) % (2*Math.PI);
      if (currentRotation < 0) currentRotation += 2*Math.PI;
      drawWheel(currentRotation);
      animFrame = requestAnimationFrame(animateSpin);
    }

    function resetGame() {
      if (isSpinning) {
        isSpinning = false;
        spinBtn.disabled = false;
        spinBtn.style.opacity = '1';
        if (animFrame) cancelAnimationFrame(animFrame);
      }
      currentRotation = 0;
      score = 0;
      lastWinValue = null;
      lastWinSpan.textContent = '—';
      scoreSpan.textContent = '0';
      drawWheel(0);
      spinBtn.disabled = false;
      spinBtn.style.opacity = '1';
    }

    spinBtn.addEventListener('click', startSpin);
    resetBtn.addEventListener('click', resetGame);
    canvas.addEventListener('click', startSpin);
    document.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Space') {
        e.preventDefault();
        if (!isSpinning) startSpin();
      }
    });

    drawWheel(0);
    updateUI(null);

    const hwList = document.getElementById('hwList');
    const hwInput = document.getElementById('hwInput');
    const addBtn = document.getElementById('addHwBtn');
    const pickBtn = document.getElementById('pickTaskBtn');
    const selectedDisplay = document.getElementById('selectedTaskDisplay');

    let tasks = [];

    try {
      const saved = localStorage.getItem('hwTasks');
      if (saved) tasks = JSON.parse(saved);
    } catch(e) { tasks = []; }

    function renderTasks() {
      hwList.innerHTML = '';
      if (tasks.length === 0) {
        hwList.innerHTML = '<li class="hw-empty">✨ No tasks yet. Add one!</li>';
        return;
      }
      tasks.forEach((task, index) => {
        const li = document.createElement('li');
        li.className = 'hw-item';
        li.innerHTML = `
          <span class="hw-text">${escapeHtml(task)}</span>
          <button class="hw-delete" data-index="${index}" aria-label="Delete task">✕</button>
        `;
        hwList.appendChild(li);
      });
      document.querySelectorAll('.hw-delete').forEach(btn => {
        btn.addEventListener('click', function() {
          const idx = parseInt(this.dataset.index);
          tasks.splice(idx, 1);
          saveAndRender();
        });
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function saveAndRender() {
      localStorage.setItem('hwTasks', JSON.stringify(tasks));
      renderTasks();
    }

    addBtn.addEventListener('click', function() {
      const text = hwInput.value.trim();
      if (text === '') return;
      tasks.push(text);
      hwInput.value = '';
      saveAndRender();
      hwInput.focus();
    });

    hwInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addBtn.click();
    });

    pickBtn.addEventListener('click', function() {
      if (tasks.length === 0) {
        selectedDisplay.innerHTML = '⚠️ No tasks to pick! Add some first.';
        selectedDisplay.style.borderColor = 'rgba(255,100,100,0.4)';
        return;
      }
      const randomIndex = Math.floor(Math.random() * tasks.length);
      const picked = tasks[randomIndex];
      selectedDisplay.innerHTML = `📌 ${escapeHtml(picked)}`;
      selectedDisplay.style.borderColor = 'rgba(255,215,0,0.6)';
      selectedDisplay.style.transform = 'scale(0.95)';
      setTimeout(() => selectedDisplay.style.transform = 'scale(1)', 150);
    });

    renderTasks();
    if (tasks.length === 0) {
      tasks = ['Math exercises.no/practice set 2.0 ', 'Read chapter 2', 'Science project draft'];
      saveAndRender();
    }

    selectedDisplay.addEventListener('click', function() {
      this.innerHTML = '<span style="opacity:0.5;">Your task will appear here</span>';
      this.style.borderColor = 'rgba(255,215,0,0.2)';
    });

  })();
</script>
</body>
</html>
